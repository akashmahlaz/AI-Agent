# Nginx config for the BACKEND EC2 instance.
# Listens on :80 + :443, terminates TLS, proxies to the Rust/Axum container
# on localhost:8080. Save as /etc/nginx/sites-available/bematterfull-api
# and symlink into sites-enabled.
#
# Requires: certbot --nginx -d api.bematterfull.com

# ── Redirect apex / unknown hostnames to the public site ──────────────────
server {
    listen 80 default_server;
    server_name _;

    location / {
        return 301 https://app.bematterfull.com$request_uri;
    }
}

server {
    listen 80;
    server_name api.bematterfull.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.bematterfull.com;

    ssl_certificate     /etc/letsencrypt/live/api.bematterfull.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bematterfull.com/privkey.pem;

    # Generous upload limit (uploads endpoint accepts multipart up to 100 MiB)
    client_max_body_size 125m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Rust API server ────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming responses (agent runs)
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
