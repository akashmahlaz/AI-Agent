# Nginx config for the FRONTEND EC2 instance.
# Listens on :80 + :443, terminates TLS, proxies to the Next.js container
# on localhost:3000. Save as /etc/nginx/sites-available/bematterfull and
# symlink into sites-enabled.
#
# Requires: certbot --nginx -d app.bematterfull.com
# (or whatever DNS A record points to this instance's public IP).

server {
    listen 80;
    server_name app.bematterfull.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name app.bematterfull.com;

    ssl_certificate     /etc/letsencrypt/live/app.bematterfull.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.bematterfull.com/privkey.pem;

    # Reasonable upload limit (Next.js standalone still needs to receive
    # uploaded files via /uploads on the BE — see backend nginx).
    client_max_body_size 100m;

    # ── Security headers ───────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Next.js standalone server ──────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming responses (chat, agent runs)
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
