name: Build and Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  SERVER_IP: 18.207.124.3
  SERVER_USER: ubuntu
  ECR_REPOSITORY_FRONTEND: operon-frontend
  ECR_REPOSITORY_BACKEND: operon-backend

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (Docker tags)
        id: meta
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)-${{ github.sha }}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "frontend_image=727646466929.dkr.ecr.us-east-1.amazonaws.com/operon-frontend:$TAG" >> $GITHUB_OUTPUT
          echo "backend_image=727646466929.dkr.ecr.us-east-1.amazonaws.com/operon-backend:$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.frontend_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.backend_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            OPERON_JWT_SECRET=${{ secrets.OPERON_JWT_SECRET }}
            OPERON_WEB_ORIGIN=https://bematterfull.fireclaw.in
            OPERON_API_BIND=0.0.0.0:8080
            OPERON_OAUTH_REDIRECT_BASE=https://bematterfull.fireclaw.in
            OPERON_NEXT_BASE_URL=https://bematterfull.fireclaw.in
            OPERON_COOKIE_SECURE=true
            AWS_REGION=${{ env.AWS_REGION }}
            AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << 'EOF'
            set -e
            cd /opt/operon

            # Pull latest code
            sudo git pull origin main

            # Update .env with latest secrets if needed
            sudo bash -c 'cat > /opt/operon/.env << '\''ENVS'\''
POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-operon-prod-password-2026}
JWT_SECRET=${{ secrets.OPERON_JWT_SECRET }}
AUTH_SECRET=${{ secrets.AUTH_SECRET }}
OPERON_WEB_ORIGIN=https://bematterfull.fireclaw.in
OPERON_API_BIND=0.0.0.0:8080
OPERON_OAUTH_REDIRECT_BASE=https://bematterfull.fireclaw.in
OPERON_NEXT_BASE_URL=https://bematterfull.fireclaw.in
OPERON_COOKIE_SECURE=true
NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
DATABASE_URL=${{ secrets.DATABASE_URL }}
AWS_REGION=${{ env.AWS_REGION }}
AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}
AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
ENVS'

            # Pull new images from ECR
            aws ecr get-login-password --region us-east-1 | sudo docker login --username AWS --password-stdin 727646466929.dkr.ecr.us-east-1.amazonaws.com
            sudo docker pull ${{ steps.meta.outputs.frontend_image }}
            sudo docker pull ${{ steps.meta.outputs.backend_image }}

            # Tag images for local use
            sudo docker tag ${{ steps.meta.outputs.frontend_image }} operon-frontend:latest
            sudo docker tag ${{ steps.meta.outputs.backend_image }} operon-backend:latest

            # Restart containers
            cd /opt/operon && sudo docker compose -f docker-compose.prod.yml down
            cd /opt/operon && sudo docker compose -f docker-compose.prod.yml up -d --build
          EOF
