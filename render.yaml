databases:
  - name: operon-db
    region: oregon
    plan: free

services:
  - type: web
    name: operon-api
    region: oregon
    plan: free
    env: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    buildCommand: ""
    startCommand: server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: operon-db
          property: connectionString
      - key: OPERON_JWT_SECRET
        generateValue: true
      - key: OPERON_WEB_ORIGIN
        value: https://operon-web.onrender.com
      - key: OPERON_API_BIND
        value: "0.0.0.0:8080"
      - key: OPERON_OAUTH_REDIRECT_BASE
        value: https://operon-web.onrender.com
      - key: OPERON_COOKIE_SECURE
        value: "true"
      - key: OPERON_WORKSPACE_ROOT
        value: /app/workspaces
      - key: RUST_LOG
        value: info
    healthCheckPath: /readyz
    autoDeploy: true

  # Frontend service (optional, if you want to deploy both)
  - type: web
    name: operon-web
    region: oregon
    plan: free
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://operon-api.onrender.com
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        value: https://operon-web.onrender.com
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
    autoDeploy: true