services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: operon-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPERON_API_BIND: 0.0.0.0:8080
      OPERON_JWT_SECRET: ${JWT_SECRET}
      OPERON_WEB_ORIGIN: https://bematterfull.fireclaw.in
      OPERON_OAUTH_REDIRECT_BASE: https://bematterfull.fireclaw.in
      OPERON_NEXT_BASE_URL: https://bematterfull.fireclaw.in
      OPERON_COOKIE_SECURE: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      OPERON_WORKSPACE_ROOT: /app/workspaces
    volumes:
      - workspaces:/app/workspaces
    networks:
      - operon-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.bematterfull.fireclaw.in
    container_name: operon-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: https://bematterfull.fireclaw.in
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      NEXT_PUBLIC_API_URL: https://api.bematterfull.fireclaw.in
    networks:
      - operon-net

volumes:
  workspaces:

networks:
  operon-net:
    driver: bridge
